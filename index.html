<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ช่างสมหมาย - Quotation Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; background-color: #f8fafc; }
        [x-cloak] { display: none !important; }
        .btn-shadow { shadow-lg shadow-indigo-200; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-entry { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-entry:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body x-data="quoteApp()">

    <!-- Header Navigation -->
    <header class="glass sticky top-0 z-40 border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-100">สม</div>
                <div class="hidden sm:block">
                    <h1 class="font-black text-indigo-950 tracking-tight leading-none">ช่างสมหมาย</h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Professional Works</p>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                <button @click="view = 'history'; fetchHistory()" :class="view === 'history' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="px-5 py-2 rounded-xl text-xs font-bold transition-all">หน้าหลัก</button>
                <button @click="view = 'create'; resetForm()" :class="view === 'create' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="px-5 py-2 rounded-xl text-xs font-bold transition-all">+ สร้างใหม่</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">

        <!-- View: History (Dashboard) -->
        <div x-show="view === 'history'" x-transition x-cloak class="space-y-6">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 tracking-tight">รายการล่าสุด</h2>
                    <p class="text-xs text-slate-400">ประวัติการเสนอราคาทั้งหมดที่คุณบันทึกไว้</p>
                </div>
                <button @click="fetchHistory()" :class="isFetching ? 'animate-spin' : ''" class="p-2.5 bg-white border border-slate-200 rounded-2xl text-indigo-600 shadow-sm hover:bg-slate-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <template x-for="item in history" :key="item.ID">
                    <div @click="openDetail(item)" class="bg-white p-5 rounded-[32px] border border-slate-100 shadow-sm card-entry cursor-pointer group flex items-center gap-4">
                        <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center text-indigo-600 group-hover:bg-indigo-50 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-0.5">
                                <span class="text-[9px] font-black bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-md uppercase" x-text="item.ID"></span>
                                <span class="text-[10px] text-slate-300 font-bold" x-text="new Date(item.Date).toLocaleDateString('th-TH')"></span>
                            </div>
                            <h3 class="font-bold text-slate-800 text-lg truncate group-hover:text-indigo-600 transition-colors" x-text="item.Customer"></h3>
                            <p class="text-xs text-slate-400 truncate" x-text="item.Project"></p>
                        </div>
                        <div class="text-right shrink-0">
                            <p class="text-xl font-black text-slate-800">฿<span x-text="parseFloat(item.Total || 0).toLocaleString()"></span></p>
                        </div>
                    </div>
                </template>
                <template x-if="history.length === 0 && !isFetching">
                    <div class="text-center py-24 bg-white rounded-[40px] border border-dashed border-slate-200 text-slate-300 space-y-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>
                        <p class="text-sm font-bold">ยังไม่มีรายการใบเสนอราคา</p>
                    </div>
                </template>
            </div>
        </div>

        <!-- View: Create/Edit -->
        <div x-show="view === 'create'" x-transition x-cloak class="space-y-6 pb-20">
            <div class="flex items-center gap-4 mb-2">
                <button @click="view = 'history'" class="p-2 bg-white rounded-xl border border-slate-200 text-slate-400 hover:text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                </button>
                <h2 class="text-2xl font-black text-slate-800 tracking-tight" x-text="form.id ? 'แก้ไขใบเสนอราคา' : 'สร้างใบเสนอราคาใหม่'"></h2>
            </div>
            
            <section class="bg-white rounded-[32px] p-8 shadow-sm border border-slate-100 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">ชื่อลูกค้า (Customer Name)</label>
                        <input type="text" x-model="form.customer" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm font-semibold focus:ring-2 ring-indigo-500 outline-none transition-all" placeholder="เช่น คุณกิตติพัฒน์">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2 tracking-widest">ชื่อโครงการ (Project)</label>
                        <input type="text" x-model="form.project" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm font-semibold focus:ring-2 ring-indigo-500 outline-none transition-all" placeholder="เช่น งานต่อเติมครัว">
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-8 pb-4 flex justify-between items-center bg-slate-50/30">
                    <h3 class="font-black text-slate-800 text-sm uppercase tracking-widest">รายการวัสดุและค่าแรง</h3>
                    <button @click="addItem()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-2xl text-xs font-black hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all">+ เพิ่มรายการ</button>
                </div>
                <div class="divide-y divide-slate-100">
                    <template x-for="(item, index) in form.items" :key="index">
                        <div class="p-8 space-y-5">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest" x-text="'ITEM #' + (index + 1)"></span>
                                <button @click="removeItem(index)" class="text-red-400 text-xs font-black p-2 hover:bg-red-50 rounded-xl transition-colors">ลบออก</button>
                            </div>
                            <input type="text" x-model="item.desc" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm font-semibold" placeholder="รายละเอียดรายการงาน...">
                            <div class="grid grid-cols-3 gap-4">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase text-center">จำนวน (ตรม.)</label>
                                    <input type="number" x-model.number="item.qty" @input="calculateItem(index)" class="w-full border border-slate-200 rounded-2xl p-3.5 text-sm text-center font-bold" placeholder="เหมา">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase text-center">ราคาหน่วย</label>
                                    <input type="number" x-model.number="item.price" @input="calculateItem(index)" class="w-full border border-slate-200 rounded-2xl p-3.5 text-sm text-right font-bold" placeholder="เหมา">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase text-center">รวมเงิน</label>
                                    <input type="number" x-model.number="item.total" @input="calculateGrandTotal()" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-3.5 text-sm text-right font-black text-indigo-600 outline-none">
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
                <div class="p-10 bg-slate-900 text-white flex justify-between items-center">
                    <div>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] opacity-50">ยอดเงินรวมสุทธิ (GRAND TOTAL)</span>
                        <h3 class="text-4xl font-black mt-1">฿ <span x-text="(form.total || 0).toLocaleString()"></span></h3>
                    </div>
                </div>
            </section>

            <section class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-4 tracking-widest">หมายเหตุและเงื่อนไข (Remarks)</label>
                <textarea x-model="form.remarks" rows="3" class="w-full bg-white border border-slate-200 rounded-[32px] p-6 text-sm font-medium outline-none shadow-sm focus:ring-2 ring-indigo-500" placeholder="ระบุเงื่อนไขการรับประกัน หรือรายละเอียดการมัดจำ..."></textarea>
            </section>

            <div class="pt-4">
                <button @click="saveQuotation()" :disabled="isLoading" class="w-full bg-indigo-600 text-white font-black py-6 rounded-[32px] shadow-2xl shadow-indigo-200 hover:bg-indigo-700 transition-all flex justify-center items-center gap-4 active:scale-[0.98]">
                    <template x-if="isLoading">
                        <svg class="animate-spin h-6 w-6 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    </template>
                    <span x-text="isLoading ? 'กำลังบันทึกและสร้าง PDF...' : 'บันทึกข้อมูลและออกใบเสนอราคา'"></span>
                </button>
            </div>
        </div>

    </main>

    <!-- Details Modal -->
    <div x-show="showDetailModal" x-cloak class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-6 bg-slate-900/60 backdrop-blur-md" @click.self="showDetailModal = false">
        <div x-show="showDetailModal" x-transition:enter="transition ease-out duration-300 transform" x-transition:enter-start="translate-y-full sm:scale-95 sm:translate-y-0" class="bg-white w-full max-w-xl rounded-t-[48px] sm:rounded-[48px] shadow-2xl overflow-hidden flex flex-col max-h-[92vh]">
            <!-- Modal Header -->
            <div class="p-10 pb-6 flex justify-between items-start">
                <div class="flex-1">
                    <span class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full uppercase tracking-widest" x-text="selectedItem?.ID"></span>
                    <h2 class="text-3xl font-black text-slate-800 mt-4 leading-tight" x-text="selectedItem?.Customer"></h2>
                    <p class="text-sm font-semibold text-slate-400 mt-1" x-text="selectedItem?.Project"></p>
                </div>
                <button @click="showDetailModal = false" class="bg-slate-100 p-3 rounded-2xl text-slate-400 hover:bg-slate-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <!-- Modal Content (Scrollable) -->
            <div class="p-10 py-0 overflow-y-auto flex-1 space-y-8">
                <div class="space-y-4">
                    <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] ml-2">รายการเสนอราคา</h4>
                    <div class="space-y-3">
                        <template x-if="selectedItem">
                            <template x-for="(item, idx) in JSON.parse(selectedItem['Items JSON'])">
                                <div class="bg-slate-50/80 p-5 rounded-[24px] flex justify-between items-center border border-slate-100/50">
                                    <div class="flex-1 min-w-0 pr-6">
                                        <p class="text-sm font-bold text-slate-800 truncate" x-text="item.desc"></p>
                                        <div class="flex gap-4 mt-1">
                                            <p class="text-[10px] font-bold text-slate-400 uppercase">
                                                จำนวน: <span class="text-slate-600" x-text="(!item.qty || item.qty === 0) ? 'เหมา' : item.qty.toLocaleString()"></span>
                                            </p>
                                            <p class="text-[10px] font-bold text-slate-400 uppercase">
                                                หน่วยละ: <span class="text-slate-600" x-text="(!item.price || item.price === 0) ? 'เหมา' : item.price.toLocaleString()"></span>
                                            </p>
                                        </div>
                                    </div>
                                    <p class="font-black text-indigo-600 text-base whitespace-nowrap tracking-tight">฿<span x-text="item.total.toLocaleString()"></span></p>
                                </div>
                            </template>
                        </template>
                    </div>
                </div>

                <div class="bg-slate-900 p-8 rounded-[32px] text-white flex justify-between items-center shadow-2xl shadow-indigo-100/50">
                    <div class="space-y-1">
                        <span class="font-black uppercase text-[10px] tracking-[0.2em] opacity-40">ยอดเงินสุทธิ</span>
                        <p class="text-2xl font-black tracking-tight">฿ <span x-text="parseFloat(selectedItem?.Total || 0).toLocaleString()"></span></p>
                    </div>
                    <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                </div>

                <div x-show="selectedItem?.Remarks" class="space-y-3 pb-6">
                    <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] ml-2">หมายเหตุเพิ่มเติม</h4>
                    <div class="bg-slate-50 border-l-4 border-indigo-200 p-4 rounded-r-2xl">
                        <p class="text-xs text-slate-500 font-medium leading-relaxed italic" x-text="selectedItem?.Remarks"></p>
                    </div>
                </div>
            </div>

            <!-- Modal Footer (Actions) -->
            <div class="p-10 bg-slate-50 border-t border-slate-100 flex flex-col gap-4">
                <div class="grid grid-cols-2 gap-4">
                    <button @click="editFromDetail()" class="bg-white border-2 border-slate-200 text-slate-700 py-5 rounded-[24px] text-xs font-black shadow-sm hover:border-indigo-600 hover:text-indigo-600 transition-all flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        แก้ไขข้อมูล
                    </button>
                    <a :href="selectedItem?.['PDF Link']" target="_blank" class="bg-indigo-600 text-white py-5 rounded-[24px] text-xs font-black shadow-xl shadow-indigo-100 text-center flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        ดาวน์โหลด PDF
                    </a>
                </div>
                <button @click="confirmDelete(selectedItem?.ID)" class="text-red-400 text-[10px] font-black uppercase tracking-widest hover:text-red-600 transition-colors">ลบรายการนี้ถาวร</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div x-show="showDeleteModal" x-cloak class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-lg">
        <div class="bg-white p-10 rounded-[48px] max-w-sm w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-red-50 text-red-500 rounded-[32px] flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </div>
            <h3 class="text-2xl font-black text-slate-800 mb-2">ลบข้อมูลนี้?</h3>
            <p class="text-sm font-semibold text-slate-400 mb-10 leading-relaxed px-4">ประวัติและไฟล์ PDF ของงานนี้จะถูกลบออกจากระบบอย่างถาวร</p>
            <div class="flex gap-4">
                <button @click="showDeleteModal = false" class="flex-1 py-5 text-slate-500 font-black bg-slate-100 rounded-3xl text-xs uppercase tracking-widest">ยกเลิก</button>
                <button @click="deleteItem()" class="flex-1 py-5 text-white font-black bg-red-500 rounded-3xl shadow-xl shadow-red-100 text-xs uppercase tracking-widest">ยืนยันการลบ</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div x-show="toast.show" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-10 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-10 scale-95"
         x-cloak 
         class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-10 py-5 rounded-[24px] shadow-2xl z-[120] text-sm font-black flex items-center gap-4">
        <div class="w-2 h-2 bg-indigo-400 rounded-full animate-ping"></div>
        <span x-text="toast.message"></span>
    </div>

    <script>
        const BASE_URL = "https://script.google.com/macros/s/AKfycbwJkx8RdX7TVYwpEjGO0grM6qBqYCfvvOh_h-VlBQRQm9MrBKQKVc0wEeML2sn3q6uZWg/exec";

        function quoteApp() {
            return {
                view: 'history',
                isLoading: false,
                isFetching: false,
                history: [],
                toast: { show: false, message: '' },
                showDetailModal: false,
                selectedItem: null,
                showDeleteModal: false,
                deleteId: null,

                form: {
                    id: null,
                    customer: '',
                    project: '',
                    items: [{ desc: '', qty: 0, price: 0, total: 0 }],
                    total: 0,
                    remarks: ''
                },

                init() {
                    this.fetchHistory();
                },

                resetForm() {
                    this.form = {
                        id: null,
                        customer: '',
                        project: '',
                        items: [{ desc: '', qty: 0, price: 0, total: 0 }],
                        total: 0,
                        remarks: ''
                    };
                },

                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => this.toast.show = false, 3000);
                },

                addItem() {
                    this.form.items.push({ desc: '', qty: 0, price: 0, total: 0 });
                },

                removeItem(index) {
                    if (this.form.items.length > 1) {
                        this.form.items.splice(index, 1);
                        this.calculateGrandTotal();
                    }
                },

                calculateItem(index) {
                    const item = this.form.items[index];
                    item.total = (item.qty || 0) * (item.price || 0);
                    this.calculateGrandTotal();
                },

                calculateGrandTotal() {
                    this.form.total = this.form.items.reduce((sum, item) => sum + (item.total || 0), 0);
                },

                async fetchHistory() {
                    if (!BASE_URL) return;
                    this.isFetching = true;
                    try {
                        const response = await fetch(`${BASE_URL}?action=list&t=${Date.now()}`);
                        const data = await response.json();
                        this.history = data || [];
                    } catch (e) {
                        console.error(e);
                        this.showToast('ไม่สามารถโหลดข้อมูลได้');
                    } finally {
                        this.isFetching = false;
                    }
                },

                openDetail(item) {
                    this.selectedItem = item;
                    this.showDetailModal = true;
                },

                editFromDetail() {
                    const item = this.selectedItem;
                    this.form = {
                        id: item.ID,
                        customer: item.Customer,
                        project: item.Project,
                        items: typeof item['Items JSON'] === 'string' ? JSON.parse(item['Items JSON']) : item['Items JSON'],
                        total: parseFloat(item.Total),
                        remarks: item.Remarks
                    };
                    this.showDetailModal = false;
                    this.view = 'create';
                },

                confirmDelete(id) {
                    this.deleteId = id;
                    this.showDeleteModal = true;
                },

                async deleteItem() {
                    this.isLoading = true;
                    this.showDeleteModal = false;
                    this.showDetailModal = false;
                    try {
                        await fetch(BASE_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({ action: 'delete', id: this.deleteId })
                        });
                        this.showToast('ลบรายการสำเร็จ');
                        setTimeout(() => {
                            this.fetchHistory();
                            this.isLoading = false;
                        }, 2000);
                    } catch (e) {
                        this.showToast('ผิดพลาด');
                        this.isLoading = false;
                    }
                },

                async saveQuotation() {
                    if (!this.form.customer) return this.showToast('กรุณากรอกชื่อลูกค้า');
                    this.isLoading = true;
                    try {
                        await fetch(BASE_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            body: JSON.stringify({ action: 'save', ...this.form })
                        });
                        this.showToast('บันทึกสำเร็จ! กำลังสร้าง PDF...');
                        setTimeout(() => {
                            this.isLoading = false;
                            this.view = 'history';
                            this.fetchHistory();
                        }, 3000);
                    } catch (e) {
                        this.showToast('ผิดพลาด');
                        this.isLoading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
