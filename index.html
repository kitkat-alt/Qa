<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ช่างสมหมาย - ระบบใบเสนอราคา</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        // *** สำคัญ: วาง URL ที่ได้จากการ Deploy Web App ที่นี่ ***
        const BASE_URL = "https://script.google.com/macros/s/AKfycbwJkx8RdX7TVYwpEjGO0grM6qBqYCfvvOh_h-VlBQRQm9MrBKQKVc0wEeML2sn3q6uZWg/exec"; 

        document.addEventListener('alpine:init', () => {
            Alpine.data('quoteApp', () => ({
                view: 'create',
                isLoading: false,
                isFetching: false,
                history: [],
                toast: { show: false, message: '' },
                form: {
                    id: null,
                    customer: '',
                    project: '',
                    items: [{ desc: '', qty: 1, price: 0, total: 0 }],
                    total: 0,
                    remarks: ''
                },

                init() {
                    this.fetchHistory();
                },

                resetForm() {
                    this.form = {
                        id: null,
                        customer: '',
                        project: '',
                        items: [{ desc: '', qty: 1, price: 0, total: 0 }],
                        total: 0,
                        remarks: ''
                    };
                },

                addItem() {
                    this.form.items.push({ desc: '', qty: 1, price: 0, total: 0 });
                },

                removeItem(index) {
                    if (this.form.items.length > 1) {
                        this.form.items.splice(index, 1);
                        this.calculateGrandTotal();
                    }
                },

                calculateItem(index) {
                    const item = this.form.items[index];
                    item.total = (item.qty || 0) * (item.price || 0);
                    this.calculateGrandTotal();
                },

                calculateGrandTotal() {
                    this.form.total = this.form.items.reduce((sum, item) => sum + (item.total || 0), 0);
                },

                showToast(msg) {
                    this.toast.message = msg;
                    this.toast.show = true;
                    setTimeout(() => this.toast.show = false, 3000);
                },

                async saveQuotation() {
                    if (!this.form.customer) return this.showToast('กรุณากรอกชื่อลูกค้า');
                    if (BASE_URL.includes("YOUR_URL_HERE")) return this.showToast('กรุณาตั้งค่า Web App URL ก่อน');

                    this.isLoading = true;
                    try {
                        // ส่งข้อมูลไปยัง Google Apps Script
                        // หมายเหตุ: mode: 'no-cors' จะส่งข้อมูลได้ แต่เบราว์เซอร์จะไม่อนุญาตให้อ่านผลลัพธ์
                        await fetch(BASE_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'save', ...this.form })
                        });
                        
                        this.showToast('บันทึกสำเร็จ! กำลังอัปเดตข้อมูล...');
                        setTimeout(() => {
                            this.isLoading = false;
                            this.view = 'history';
                            this.fetchHistory();
                            this.resetForm();
                        }, 3000);
                        
                    } catch (error) {
                        console.error('Save error:', error);
                        this.showToast('เกิดข้อผิดพลาดในการบันทึก');
                        this.isLoading = false;
                    }
                },

                async fetchHistory() {
                    if (!BASE_URL || BASE_URL.includes("YOUR_URL_HERE")) return;
                    this.isFetching = true;
                    try {
                        const response = await fetch(`${BASE_URL}?action=list&t=${Date.now()}`);
                        const data = await response.json();
                        this.history = Array.isArray(data) ? data : [];
                    } catch (error) {
                        console.error('Fetch error:', error);
                        // ถ้าติด CORS ในหน้า Preview ให้ลองเปิดผ่าน URL จริง
                    } finally {
                        this.isFetching = false;
                    }
                },

                editQuote(item) {
                    try {
                        this.form = {
                            id: item.ID,
                            customer: item.Customer,
                            project: item.Project,
                            items: typeof item['Items JSON'] === 'string' ? JSON.parse(item['Items JSON']) : item['Items JSON'],
                            total: parseFloat(item.Total),
                            remarks: item.Remarks
                        };
                        this.view = 'create';
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } catch (e) {
                        this.showToast('โหลดข้อมูลผิดพลาด');
                    }
                }
            }));
        });
    </script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif; background: #f8fafc; color: #1e293b; }
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .input-box { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; background: #fff; width: 100%; transition: all 0.2s; outline: none; }
        .input-box:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body x-data="quoteApp">

    <header class="glass sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-200">สม</div>
                <div>
                    <h1 class="font-bold text-base leading-tight text-indigo-900">ช่างสมหมาย</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Quotation Pro</p>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button @click="view = 'create'; resetForm()" :class="view === 'create' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="px-5 py-2 rounded-lg text-xs font-bold transition-all">สร้าง</button>
                <button @click="view = 'history'; fetchHistory()" :class="view === 'history' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500'" class="px-5 py-2 rounded-lg text-xs font-bold transition-all">ประวัติ</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 pb-32">
        
        <!-- View: Create -->
        <div x-show="view === 'create'" x-transition class="space-y-6">
            <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <h2 class="font-bold text-slate-800 text-sm mb-4">ข้อมูลลูกค้า</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" x-model="form.customer" class="input-box" placeholder="ชื่อลูกค้า">
                    <input type="text" x-model="form.project" class="input-box" placeholder="ชื่อโปรเจกต์ / หน้างาน">
                </div>
            </section>

            <section class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-6 flex justify-between items-center bg-slate-50/50">
                    <h2 class="font-bold text-slate-800 text-sm">รายการประเมินราคา</h2>
                    <button @click="addItem()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-100">+ เพิ่มงาน</button>
                </div>
                
                <div class="divide-y divide-slate-100">
                    <template x-for="(item, index) in form.items" :key="index">
                        <div class="p-5 space-y-4">
                            <div class="flex justify-between items-center">
                                <span class="text-[11px] font-black text-slate-300 uppercase tracking-widest" x-text="'รายการที่ ' + (index + 1)"></span>
                                <button @click="removeItem(index)" class="text-red-400 hover:text-red-600 p-1">ลบออก</button>
                            </div>
                            <input type="text" x-model="item.desc" class="input-box" placeholder="รายละเอียดของงานหรือวัสดุ...">
                            <div class="grid grid-cols-3 gap-3">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-tighter">จำนวน (ตรม.)</label>
                                    <input type="number" x-model.number="item.qty" @input="calculateItem(index)" class="input-box text-center">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-tighter">ราคา/หน่วย</label>
                                    <input type="number" x-model.number="item.price" @input="calculateItem(index)" class="input-box text-right">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase tracking-tighter">รวมเงิน</label>
                                    <input type="number" x-model.number="item.total" @input="calculateGrandTotal()" class="input-box text-right font-bold text-indigo-600 bg-slate-50">
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="p-8 bg-indigo-600 text-white flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-bold uppercase tracking-widest opacity-70">ยอดรวมทั้งสิ้น (Total)</p>
                        <h3 class="text-4xl font-black">฿ <span x-text="(form.total || 0).toLocaleString()"></span></h3>
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-2">หมายเหตุ / เงื่อนไข</label>
                <textarea x-model="form.remarks" rows="2" class="input-box" placeholder="ระบุหมายเหตุ..."></textarea>
            </section>

            <button @click="saveQuotation()" :disabled="isLoading" 
                class="w-full bg-slate-900 text-white font-bold py-5 rounded-3xl shadow-xl hover:bg-black transition-all flex justify-center items-center gap-3 active:scale-[0.98]">
                <template x-if="isLoading">
                    <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </template>
                <span x-text="isLoading ? 'กำลังบันทึกและสร้าง PDF...' : 'บันทึกและออกใบเสนอราคา'"></span>
            </button>
        </div>

        <!-- View: History -->
        <div x-show="view === 'history'" x-cloak class="space-y-4">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-2xl font-black text-slate-800">ประวัติงานล่าสุด</h2>
                <button @click="fetchHistory()" class="text-indigo-600 text-xs font-bold px-3 py-1 bg-indigo-50 rounded-lg">รีเฟรช</button>
            </div>
            
            <template x-if="history.length === 0">
                <div class="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-200 text-slate-400">
                    <p class="text-sm">ยังไม่มีข้อมูลในระบบ หรือกำลังโหลด...</p>
                </div>
            </template>

            <div class="grid grid-cols-1 gap-4">
                <template x-for="item in history" :key="item.ID">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center gap-4 hover:border-indigo-200 transition-colors">
                        <div class="flex-1 min-w-0">
                            <span class="text-[9px] font-black bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-md uppercase" x-text="item.ID"></span>
                            <h3 class="font-bold text-slate-800 truncate mt-1" x-text="item.Customer"></h3>
                            <p class="text-xs text-slate-400 truncate" x-text="item.Project"></p>
                            <p class="text-[10px] text-slate-300 mt-1" x-text="new Date(item.Date).toLocaleDateString('th-TH')"></p>
                        </div>
                        <div class="text-right flex flex-col items-end gap-2">
                            <p class="font-black text-slate-800 text-lg">฿<span x-text="parseFloat(item.Total || 0).toLocaleString()"></span></p>
                            <div class="flex gap-2">
                                <button @click="editQuote(item)" class="bg-slate-100 hover:bg-slate-200 p-2 rounded-xl text-slate-600">แก้ไข</button>
                                <a :href="item['PDF Link']" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 p-2 px-4 rounded-xl text-white text-xs font-bold shadow-lg shadow-indigo-100 flex items-center gap-1">
                                    ดู PDF
                                </a>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>

    <div x-show="toast.show" x-transition x-cloak class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-3xl shadow-2xl z-[100] text-sm font-bold" x-text="toast.message"></div>

</body>
</html>
